bases:
  - ../../bases/repositories.yaml

releases:
  - name: n8n
    namespace: n8n
    chart: community-charts/n8n
    version: ~1.16.0
    values:
      - values.yaml
    hooks:
      - events: ["presync"]
        showlogs: true
        command: "kubectl"
        args:
          - "apply"
          - "-f"
          - "namespace.yaml"
      - events: ["presync"]
        showlogs: true
        command: "kubectl"
        args:
          - "apply"
          - "-f"
          - "sealed-secret.yaml"
