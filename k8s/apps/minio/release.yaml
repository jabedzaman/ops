bases:
  - ../../bases/repositories.yaml

releases:
  - name: minio
    namespace: minio
    chart: minio/minio
    version: ~5.2.0
    values:
      - values.yaml
    hooks:
      - events: ["presync"]
        showlogs: true
        command: "kubectl"
        args:
          - "apply"
          - "-f"
          - "namespace.yaml"
      - events: ["presync"]
        showlogs: true
        command: "kubectl"
        args:
          - "apply"
          - "-f"
          - "sealed-secret.yaml"
