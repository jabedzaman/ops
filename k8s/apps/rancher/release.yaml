bases:
  - ../../bases/repositories.yaml

releases:
  - name: rancher
    namespace: cattle-system
    chart: rancher-stable/rancher
    version: ~2.13.0
    values:
      - values.yaml
    hooks:
      - events: ["presync"]
        showlogs: true
        command: "kubectl"
        args:
          - "apply"
          - "-f"
          - "namespace.yaml"
      - events: ["postsync"]
        showlogs: true
        command: "kubectl"
        args:
          - "apply"
          - "-f"
          - "ingress-route.yaml"
